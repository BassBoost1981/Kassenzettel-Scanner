<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Hintergrund Farbverlauf (Dunkles App-Blau) -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>

    <!-- Scanner-Lichtstrahl Farbverlauf -->
    <linearGradient id="beamGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0" />
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0.25" />
    </linearGradient>
  </defs>

  <!-- App-Icon Hintergrund (Abgerundetes Quadrat) -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bgGradient)" />

  <!-- Einfacher, kompatibler Schlagschatten für den Kassenzettel -->
  <path d="M 176 100 H 336 Q 346 100 346 110 V 400 L 326 384 L 306 400 L 286 384 L 266 400 L 246 384 L 226 400 L 206 384 L 186 400 L 166 384 V 110 Q 166 100 176 100 Z" fill="#000000" opacity="0.3" transform="translate(8, 12)" />

  <!-- Kassenzettel Basis (Weiß) -->
  <path d="M 176 100 H 336 Q 346 100 346 110 V 400 L 326 384 L 306 400 L 286 384 L 266 400 L 246 384 L 226 400 L 206 384 L 186 400 L 166 384 V 110 Q 166 100 176 100 Z" fill="#FFFFFF" />

  <!-- Barcode oben auf dem Zettel -->
  <path d="M 196 126 v 24 m 8 -24 v 24 m 12 -24 v 24 m 6 -24 v 24 m 12 -24 v 24 m 6 -24 v 24 m 8 -24 v 24 m 12 -24 v 24 m 12 -24 v 24 m 8 -24 v 24 m 8 -24 v 24 m 12 -24 v 24" stroke="#475569" stroke-width="4" stroke-linecap="round" />

  <!-- Textlinien auf dem Kassenzettel (Artikel & Preise) -->
  <rect x="196" y="174" width="80" height="8" rx="4" fill="#CBD5E1" />
  <rect x="296" y="174" width="20" height="8" rx="4" fill="#94A3B8" />

  <rect x="196" y="194" width="60" height="8" rx="4" fill="#CBD5E1" />
  <rect x="296" y="194" width="20" height="8" rx="4" fill="#94A3B8" />

  <rect x="196" y="214" width="90" height="8" rx="4" fill="#CBD5E1" />
  <rect x="296" y="214" width="20" height="8" rx="4" fill="#94A3B8" />

  <rect x="196" y="234" width="50" height="8" rx="4" fill="#CBD5E1" />
  <rect x="296" y="234" width="20" height="8" rx="4" fill="#94A3B8" />

  <rect x="196" y="254" width="70" height="8" rx="4" fill="#CBD5E1" />
  <rect x="296" y="254" width="20" height="8" rx="4" fill="#94A3B8" />

  <!-- Trennlinie -->
  <line x1="196" y1="284" x2="316" y2="284" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 4" stroke-linecap="round" />

  <!-- Summen-Bereich (Total) -->
  <rect x="196" y="304" width="44" height="12" rx="6" fill="#64748B" />
  <rect x="276" y="304" width="40" height="12" rx="6" fill="#0284C7" />

  <!-- Scanner Lichtbereich (halbtransparentes Cyan) -->
  <rect x="140" y="90" width="232" height="170" fill="url(#beamGradient)" />

  <!-- Scanner Laser-Linie (mit übereinanderliegenden Linien für einen perfekten Glow-Effekt ohne feGaussianBlur) -->
  <line x1="130" y1="260" x2="382" y2="260" stroke="#00FFFF" stroke-width="24" stroke-linecap="round" opacity="0.15" />
  <line x1="130" y1="260" x2="382" y2="260" stroke="#00FFFF" stroke-width="12" stroke-linecap="round" opacity="0.4" />
  <line x1="130" y1="260" x2="382" y2="260" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />

  <!-- Kamera/Scanner Fokus-Ecken (Brackets) -->
  <path d="M 140 140 V 90 H 190" fill="none" stroke="#00FFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 322 90 H 372 V 140" fill="none" stroke="#00FFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 140 370 V 420 H 190" fill="none" stroke="#00FFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 322 420 H 372 V 370" fill="none" stroke="#00FFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />

</svg>